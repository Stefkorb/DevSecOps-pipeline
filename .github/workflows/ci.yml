name: CI Pipeline

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
  pull_request:
    branches:
      - master
      - main

jobs:
  quality-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt

      - name: Run Black
        run: python -m black app 

      - name: Run flake8
        run: python -m flake8 app

      - name: Run tests
        run: python -m pytest app/tests -v

      - name: Run Bandit SAST scan
        run: python -m bandit -r app --exclude app/tests

      - name: Run Gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Hadolint (Dockerfile best-practices enforcement)
        run: docker run --rm -i  hadolint/hadolint < docker/Dockerfile

      - name: Run dependency vulnerability scan
        run: python -m pip_audit -r app/requirements.txt