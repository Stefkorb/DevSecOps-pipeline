name: Release Promotion Pipeline

on:
  workflow_dispatch:
    inputs:
      source_sha_tag:
        description: "Tested source image tag (example: sha-0c9914c)"
        required: true
      release_version:
        description: "Release version (example: v0.1.0)"
        required: true
        default: "v0.1.0"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devsecops-pipeline

jobs:
  promote-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create release tag from tested image
        run: |
          docker buildx imagetools create \
          --tag $IMAGE_NAME:${{ github.event.inputs.release_version }} \
          $IMAGE_NAME:${{ github.event.inputs.source_sha_tag }}

      - name: Inspect promoted release image
        run: |
          docker buildx imagetools inspect \
          $IMAGE_NAME:${{ github.event.inputs.release_version }}