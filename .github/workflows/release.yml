name: Release Promotion Pipeline

on:
  workflow_dispatch:
    inputs:
      source_sha_tag:
        description: "Tested source image tag (example: sha-0c9914c)"
        required: true
      release_version:
        description: "Release version (example: v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  promote-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Normalize image name
        id: image
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/devsecops-pipeline" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Validate release version format
        run: |
          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version format: $RELEASE_VERSION"
            echo "Expected format: vMAJOR.MINOR.PATCH (example: v1.2.0)"
            exit 1
          fi

      - name: Verify source SHA image exists
        run: |
          docker buildx imagetools inspect \
            ${{ steps.image.outputs.image_name }}:${{ github.event.inputs.source_sha_tag }} > /dev/null

      - name: Enforce immutable release tag
        run: |
          if docker buildx imagetools inspect \
            ${{ steps.image.outputs.image_name }}:${{ github.event.inputs.release_version }} > /dev/null 2>&1; then
            echo "Release tag already exists: ${{ github.event.inputs.release_version }}"
            echo "Release tags are immutable and cannot be reassigned."
            exit 1
          fi

      - name: Create release tag from tested image
        run: |
          docker buildx imagetools create \
            --tag ${{ steps.image.outputs.image_name }}:${{ github.event.inputs.release_version }} \
            ${{ steps.image.outputs.image_name }}:${{ github.event.inputs.source_sha_tag }}

      - name: Inspect promoted release image
        run: |
          docker buildx imagetools inspect \
            ${{ steps.image.outputs.image_name }}:${{ github.event.inputs.release_version }}