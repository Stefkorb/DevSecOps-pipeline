name: Container Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  container-security:
    name: container-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Normalize image name to lowercase
        id: image
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/devsecops-pipeline" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      # ✅ Build happens ALWAYS (PR + main)
      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile \
            -t ${{ steps.image.outputs.image_name }}:${{ steps.vars.outputs.sha_tag }} \
            .

      - name: Export image to tar
        run: |
          docker save -o tested-image.tar \
            ${{ steps.image.outputs.image_name }}:${{ steps.vars.outputs.sha_tag }}

      # ✅ Scan happens ALWAYS
      - name: Run Trivy scan (report HIGH and CRITICAL)
        run: |
          docker run --rm -v "$PWD:/work" aquasec/trivy:latest image \
            --input /work/tested-image.tar \
            --severity HIGH,CRITICAL

      - name: Run Trivy policy gate (fail on CRITICAL)
        run: |
          docker run --rm -v "$PWD:/work" aquasec/trivy:latest image \
            --input /work/tested-image.tar \
            --severity CRITICAL \
            --exit-code 1

      # ❗ Login μόνο στο main
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ❗ Push ΜΟΝΟ στο main
      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ steps.image.outputs.image_name }}:${{ steps.vars.outputs.sha_tag }}